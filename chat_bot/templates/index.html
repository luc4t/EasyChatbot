{% extends "layout.html" %}
{% block title %}
Easy Chat Bot
{% endblock %}
{% block headloadscript %}
    <!-- Include any additional scripts here -->
    <script src="{{ url_for('static', filename='assets/js/chat.js') }}"></script>
{% endblock %}
{% block content %}
<div class="chat-container">
    <div class="chat-header">
        <h1>Chat</h1>
    </div>
    <div class="chat-messages" id="chatBubblesContainer">
        <!-- Chat messages will appear here -->
    </div>
</div>
<div class="chat-input">
    <textarea id="chatTextBox" placeholder="Type a message..." autofocus></textarea>
    <button id="chatSubmitBtn" class="send-button">Send</button>
</div>
{% endblock %}
