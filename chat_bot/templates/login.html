{% extends "layout.html" %}
{% block title %}
Login to Pflege- & Hygienerichtlinien KSGR
{% endblock %}
{% block headloadscript %}
{% endblock %}
{% block content %}

{% if message %}
<div class="loginErrorBox">{{ message }}</div>
{% endif %}
<div class="loginBox">
  <h2>Login</h2>
  <form action="#" method="post">
    <div class="formGroup">
      <label for="username">Benutzername:</label>
      <input type="text" name="username" placeholder="Benutzername eingeben" />
    </div>
    <div class="formGroup">      
      <label for="password">Passwort:</label>
      <input type="password" name="password" placeholder="Passwort eingeben" />
    </div>
    <div class="formGroup">
      <button type="submit">Einloggen</button>
    </div>
  </form>
</div>

{% endblock %}
{% block bottomloadscript %}
{% endblock %}
